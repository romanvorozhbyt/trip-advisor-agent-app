AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TripAdvisorAgent – Full AWS infrastructure.
  Provisions a VPC, EKS cluster (Web API), API Gateway HTTP API,
  and a Lambda function that runs the news-ingestion cycle every 3 hours.

# ── Parameters ────────────────────────────────────────────────────────────────
Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues: [production, staging]
    Description: Deployment environment tag applied to all resources.

  # EKS
  EksNodeInstanceType:
    Type: String
    Default: t3.medium
    Description: EC2 instance type for EKS worker nodes.

  EksNodeDesiredCount:
    Type: Number
    Default: 2
    MinValue: 1
    MaxValue: 10

  EksNodeMinCount:
    Type: Number
    Default: 1

  EksNodeMaxCount:
    Type: Number
    Default: 5

  KubernetesVersion:
    Type: String
    Default: "1.32"

  # Web API image (ECR URI pushed by your CI pipeline)
  WebApiImageUri:
    Type: String
    Description: >
      ECR image URI for the Web API container, e.g.
      123456789012.dkr.ecr.us-east-1.amazonaws.com/trip-advisor-webapi:latest

  # Lambda deployment (S3 zip created by `dotnet lambda package`)
  LambdaS3Bucket:
    Type: String
    Description: S3 bucket that holds the Lambda deployment zip.

  LambdaS3Key:
    Type: String
    Default: lambda/TripAdvisorAgent.NewsIngestionLambda.zip
    Description: S3 key for the Lambda zip artifact.

  # App secrets – stored in SSM Parameter Store (SecureString)
  GitHubModelsApiKey:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /trip-advisor-agent/GitHubModels__ApiKey
    NoEcho: true

  QdrantHost:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /trip-advisor-agent/Qdrant__Host

  QdrantPort:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /trip-advisor-agent/Qdrant__Port

  QdrantUseHttps:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /trip-advisor-agent/Qdrant__UseHttps

  QdrantApiKey:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /trip-advisor-agent/Qdrant__ApiKey
    NoEcho: true

  NewsRssFeeds:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /trip-advisor-agent/News__RssFeedsRaw
    Description: >
      Comma-separated RSS feed URLs stored in SSM, e.g. "https://feed1,https://feed2".
      Mapped to News__RssFeedsRaw because Lambda env vars cannot express string arrays;
      PostConfigure splits this into NewsOptions.RssFeeds at startup.

# ── Mappings ───────────────────────────────────────────────────────────────────
Mappings:
  SubnetConfig:
    VPC:
      CIDR: "10.0.0.0/16"
    PublicSubnet1:
      CIDR: "10.0.0.0/24"
    PublicSubnet2:
      CIDR: "10.0.1.0/24"
    PrivateSubnet1:
      CIDR: "10.0.10.0/24"
    PrivateSubnet2:
      CIDR: "10.0.11.0/24"

# ── Resources ─────────────────────────────────────────────────────────────────
Resources:

  # ── VPC & Networking ──────────────────────────────────────────────────────
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !FindInMap [SubnetConfig, VPC, CIDR]
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "trip-advisor-${Environment}-vpc"
        - Key: Environment
          Value: !Ref Environment

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "trip-advisor-${Environment}-igw"

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # ── Public Subnets ─────────────────────────────────────────────────────────
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !FindInMap [SubnetConfig, PublicSubnet1, CIDR]
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "trip-advisor-${Environment}-public-1"
        - Key: kubernetes.io/role/elb
          Value: "1"

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !FindInMap [SubnetConfig, PublicSubnet2, CIDR]
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "trip-advisor-${Environment}-public-2"
        - Key: kubernetes.io/role/elb
          Value: "1"

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  # ── NAT Gateway (for private subnet egress) ───────────────────────────────
  NatEIP:
    Type: AWS::EC2::EIP
    DependsOn: VPCGatewayAttachment
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEIP.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub "trip-advisor-${Environment}-nat"

  # ── Private Subnets ────────────────────────────────────────────────────────
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !FindInMap [SubnetConfig, PrivateSubnet1, CIDR]
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "trip-advisor-${Environment}-private-1"
        - Key: kubernetes.io/role/internal-elb
          Value: "1"

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !FindInMap [SubnetConfig, PrivateSubnet2, CIDR]
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "trip-advisor-${Environment}-private-2"
        - Key: kubernetes.io/role/internal-elb
          Value: "1"

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PrivateDefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      NatGatewayId: !Ref NatGateway

  PrivateSubnet1RouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  # ── Security Groups ────────────────────────────────────────────────────────
  EksClusterSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: EKS cluster control-plane security group
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "trip-advisor-${Environment}-eks-cluster-sg"

  NodeSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: EKS worker node security group
      VpcId: !Ref VPC
      SecurityGroupIngress:
        # Allow intra-node traffic
        - IpProtocol: "-1"
          SourceSecurityGroupId: !GetAtt NodeSecurityGroup.GroupId
        # Allow control plane to reach nodes
        - IpProtocol: tcp
          FromPort: 1025
          ToPort: 65535
          SourceSecurityGroupId: !Ref EksClusterSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub "trip-advisor-${Environment}-node-sg"

  # Allow nodes to talk to control plane
  NodeToControlPlaneIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref EksClusterSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      SourceSecurityGroupId: !Ref NodeSecurityGroup

  # ── IAM ────────────────────────────────────────────────────────────────────
  EksClusterRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "trip-advisor-${Environment}-eks-cluster-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: eks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy

  EksNodeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "trip-advisor-${Environment}-eks-node-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "trip-advisor-${Environment}-lambda-news-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: LambdaS3ReadDeployment
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub "arn:aws:s3:::${LambdaS3Bucket}/${LambdaS3Key}"
        - PolicyName: LambdaSSMReadConfig
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/trip-advisor-agent/*"
              - Effect: Allow
                Action:
                  - kms:Decrypt
                Resource: "*"
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub "ssm.${AWS::Region}.amazonaws.com"

  # ── EKS Cluster ─────────────────────────────────────────────────────────────
  EksCluster:
    Type: AWS::EKS::Cluster
    Properties:
      Name: !Sub "trip-advisor-${Environment}"
      Version: !Ref KubernetesVersion
      RoleArn: !GetAtt EksClusterRole.Arn
      ResourcesVpcConfig:
        SubnetIds:
          - !Ref PrivateSubnet1
          - !Ref PrivateSubnet2
          - !Ref PublicSubnet1
          - !Ref PublicSubnet2
        SecurityGroupIds:
          - !Ref EksClusterSecurityGroup
        EndpointPublicAccess: true
        EndpointPrivateAccess: true
      Logging:
        ClusterLogging:
          EnabledTypes:
            - Type: api
            - Type: audit
            - Type: authenticator
      Tags:
        - Key: Environment
          Value: !Ref Environment

  EksNodeGroup:
    Type: AWS::EKS::Nodegroup
    DependsOn: EksCluster
    Properties:
      ClusterName: !Ref EksCluster
      NodegroupName: !Sub "trip-advisor-${Environment}-nodes"
      NodeRole: !GetAtt EksNodeRole.Arn
      Subnets:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      InstanceTypes:
        - !Ref EksNodeInstanceType
      ScalingConfig:
        MinSize: !Ref EksNodeMinCount
        MaxSize: !Ref EksNodeMaxCount
        DesiredSize: !Ref EksNodeDesiredCount
      AmiType: AL2_x86_64
      DiskSize: 20
      Labels:
        role: webapi
      Tags:
        Environment: !Ref Environment

  # ── Lambda: News Ingestion ──────────────────────────────────────────────────
  NewsIngestionLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "trip-advisor-${Environment}-news-ingestion"
      Description: "Fetches travel RSS feeds every 3 hours and ingests new articles into Qdrant."
      Runtime: provided.al2023
      Architectures: [x86_64]
      Handler: bootstrap
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: !Ref LambdaS3Key
      MemorySize: 512
      Timeout: 600   # 10 min – generous for multi-feed embedding calls
      Environment:
        Variables:
          # Hierarchical config keys use __ as the separator (ASP.NET Core convention)
          GitHubModels__ApiKey: !Ref GitHubModelsApiKey
          GitHubModels__Endpoint: "https://models.inference.ai.azure.com"
          GitHubModels__EmbeddingModelId: "text-embedding-3-small"
          Qdrant__Host: !Ref QdrantHost
          Qdrant__Port: !Ref QdrantPort
          Qdrant__UseHttps: !Ref QdrantUseHttps
          Qdrant__ApiKey: !Ref QdrantApiKey
          News__RssFeedsRaw: !Ref NewsRssFeeds
          News__FetchIntervalHours: "3"
          News__MaxItemsPerFeed: "20"
          News__ArticleMaxLength: "800"
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: news-ingestion

  # ── EventBridge Scheduler: every 3 hours ───────────────────────────────────
  NewsIngestionSchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "trip-advisor-${Environment}-scheduler-news-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt NewsIngestionLambda.Arn

  NewsIngestionSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: !Sub "trip-advisor-${Environment}-news-ingestion-every-3h"
      Description: "Triggers the news-ingestion Lambda every 3 hours."
      ScheduleExpression: "rate(3 hours)"
      ScheduleExpressionTimezone: "UTC"
      FlexibleTimeWindow:
        Mode: "OFF"
      Target:
        Arn: !GetAtt NewsIngestionLambda.Arn
        RoleArn: !GetAtt NewsIngestionSchedulerRole.Arn
        RetryPolicy:
          MaximumRetryAttempts: 2
          MaximumEventAgeInSeconds: 3600
      State: ENABLED

  # ── API Gateway HTTP API ────────────────────────────────────────────────────
  # The Web API Kubernetes Service must be exposed via an AWS Network Load Balancer
  # (NLB) created by the AWS Load Balancer Controller using a Service of type
  # LoadBalancer. Once the NLB DNS name is known, fill in the NlbDnsName parameter
  # or update the integration URI below.
  #
  # For initial deployment set NlbDnsName to a placeholder; update after EKS
  # workloads are running.
  NlbDnsName:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/trip-advisor-agent/${Environment}/nlb-dns"
      Type: String
      Value: "placeholder-update-after-eks-deployment"
      Description: >
        DNS name of the NLB created by the EKS Load Balancer Controller for the
        WebAPI service. Update this value after deploying k8s/webapi.yaml.

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "trip-advisor-${Environment}-api"
      ProtocolType: HTTP
      Description: "Exposes the TripAdvisorAgent Web API from EKS to the internet."
      CorsConfiguration:
        AllowOrigins: ["*"]
        AllowMethods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
        AllowHeaders: ["Content-Type", "Authorization"]
        MaxAge: 86400
      Tags:
        Environment: !Ref Environment

  # VPC Link routes traffic through the private subnets to the NLB
  ApiVpcLink:
    Type: AWS::ApiGatewayV2::VpcLink
    Properties:
      Name: !Sub "trip-advisor-${Environment}-vpc-link"
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref NodeSecurityGroup

  # Forward all routes to the NLB (HTTP)
  ApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: HTTP_PROXY
      IntegrationMethod: ANY
      IntegrationUri: !Sub
        - "http://${NlbDns}:80/{proxy}"
        - NlbDns: !GetAtt NlbDnsName.Value
      ConnectionType: VPC_LINK
      ConnectionId: !Ref ApiVpcLink
      PayloadFormatVersion: "1.0"
      TimeoutInMillis: 30000

  # Catch-all route
  ApiDefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "$default"
      Target: !Sub "integrations/${ApiIntegration}"
      AuthorizationType: NONE

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: "$default"
      AutoDeploy: true
      DefaultRouteSettings:
        ThrottlingBurstLimit: 500
        ThrottlingRateLimit: 1000
      Tags:
        Environment: !Ref Environment

# ── Outputs ───────────────────────────────────────────────────────────────────
Outputs:
  VpcId:
    Description: VPC ID
    Value: !Ref VPC
    Export:
      Name: !Sub "trip-advisor-${Environment}-vpc-id"

  PrivateSubnet1Id:
    Value: !Ref PrivateSubnet1
    Export:
      Name: !Sub "trip-advisor-${Environment}-private-subnet-1"

  PrivateSubnet2Id:
    Value: !Ref PrivateSubnet2
    Export:
      Name: !Sub "trip-advisor-${Environment}-private-subnet-2"

  EksClusterName:
    Description: EKS cluster name (use with kubectl/Helm)
    Value: !Ref EksCluster
    Export:
      Name: !Sub "trip-advisor-${Environment}-eks-cluster"

  EksClusterArn:
    Value: !GetAtt EksCluster.Arn

  NewsIngestionLambdaArn:
    Description: ARN of the news-ingestion Lambda function
    Value: !GetAtt NewsIngestionLambda.Arn

  NewsIngestionScheduleArn:
    Description: ARN of the EventBridge schedule (fires every 3 hours)
    Value: !Ref NewsIngestionSchedule

  ApiGatewayUrl:
    Description: Base URL for the HTTP API Gateway
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
    Export:
      Name: !Sub "trip-advisor-${Environment}-api-url"
